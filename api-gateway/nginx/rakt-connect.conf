server {
    listen 80;
    server_name raktconnect.gov.in;

    # STQC N22: Geo-blocking (Allow only India IP ranges - simplified for example via Cloudflare headers)
    # if ($http_cf_ipcountry != 'IN') { return 403; }

    # STQC N13/N14: Enforce TLS & HSTS
    return 301 https://$host$request_uri;
}

server {
    listen 443 ssl http2;
    server_name raktconnect.gov.in;

    # STQC: PQC-Ready / TLS 1.3 only
    ssl_protocols TLSv1.3;
    ssl_prefer_server_ciphers on;
    ssl_ciphers "ECDHE-ECDSA-AES256-GCM-SHA384:ECDHE-RSA-AES256-GCM-SHA384";

    # STQC A12: Web Application Firewall Reverse Proxy Headers
    proxy_set_header X-Real-IP $remote_addr;
    proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
    proxy_set_header X-Forwarded-Proto $scheme;
    
    # Add Security Headers
    add_header Strict-Transport-Security "max-age=31536000; includeSubDomains; preload" always;
    add_header X-Content-Type-Options "nosniff" always;
    add_header X-Frame-Options "DENY" always;
    add_header X-XSS-Protection "1; mode=block" always;
    add_header Content-Security-Policy "default-src 'self'; script-src 'self' 'unsafe-inline'; object-src 'none';" always;

    # Route: API Gateway (Node.js) -> Blockchain Writes
    location /api/ {
        # Limit payloads to 1MB to prevent buffer overflows (STQC A6)
        client_max_body_size 1M;
        proxy_pass http://localhost:3001/;
        
        # Rate Limiting: 100 req/sec per hospital node
        limit_req zone=rakt_api burst=20 nodelay;
    }

    # Route: AI Microservice Python
    location /ai/ {
        proxy_pass http://localhost:8000/;
        proxy_read_timeout 120s; # TFT models can take longer
    }

    # Route: Next.js Frontend
    location / {
        proxy_pass http://localhost:3000/;
    }
}
