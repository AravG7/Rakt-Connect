allprojects {
    repositories {
        google()
        mavenCentral()
    }
}

// Inject fallback properties only into 3rd-party plugins that blindly expect 'project.flutter'
subprojects { project ->
    if (project.name != 'app') {
        project.ext.flutter = [
            compileSdkVersion: 34,
            minSdkVersion: 21,
            targetSdkVersion: 34
        ]
    }
}

rootProject.buildDir = "../build"
subprojects {
    project.buildDir = "${rootProject.buildDir}/${project.name}"
}
subprojects {
    project.evaluationDependsOn(":app")
}

tasks.register("clean", Delete) {
    delete rootProject.buildDir
}
