# ═══════════════════════════════════════════════════════════════════════════════
# RAKT-CONNECT — GitHub Actions CI/CD Pipeline
# Build, Test, and Deploy all components
# ═══════════════════════════════════════════════════════════════════════════════

name: Rakt-Connect CI/CD

on:
  push:
    branches: [main, develop]
  pull_request:
    branches: [main]

env:
  REGISTRY: ghcr.io

jobs:
  # ── Lint & Type Check ──────────────────────────────────────────────────────
  lint:
    name: Lint & Type Check
    runs-on: ubuntu-latest
    strategy:
      matrix:
        include:
          - component: web-dashboard
            cmd: "npm ci && npm run lint"
          - component: api-gateway
            cmd: "npm ci && npm run lint"
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'
          cache-dependency-path: ${{ matrix.component }}/package-lock.json
      - run: cd ${{ matrix.component }} && ${{ matrix.cmd }}

  # ── Web Dashboard Build ────────────────────────────────────────────────────
  build-web:
    name: Build Web Dashboard
    runs-on: ubuntu-latest
    needs: lint
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'
          cache-dependency-path: web-dashboard/package-lock.json
      - run: cd web-dashboard && npm ci && npm run build

  # ── API Gateway Tests ──────────────────────────────────────────────────────
  test-api:
    name: Test API Gateway
    runs-on: ubuntu-latest
    needs: lint
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'
          cache-dependency-path: api-gateway/package-lock.json
      - run: cd api-gateway && npm ci && npm test

  # ── AI Microservice Tests ──────────────────────────────────────────────────
  test-ai:
    name: Test AI Microservice
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: '3.11'
          cache: 'pip'
          cache-dependency-path: ai-microservice/requirements.txt
      - run: |
          cd ai-microservice
          pip install -r requirements.txt pytest httpx
          python -m pytest tests/ -v

  # ── Chaincode Tests (Go) ───────────────────────────────────────────────────
  test-chaincode:
    name: Test Chaincode
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-go@v5
        with:
          go-version: '1.22'
          cache-dependency-path: chaincode/blood-bank/go/go.sum
      - run: |
          cd chaincode/blood-bank/go
          go mod tidy
          go test ./... -v -cover

  # ── Docker Build ───────────────────────────────────────────────────────────
  docker-build:
    name: Docker Build
    runs-on: ubuntu-latest
    needs: [build-web, test-api, test-ai, test-chaincode]
    permissions:
      contents: read
      packages: write
    strategy:
      matrix:
        include:
          - context: api-gateway
            image: api-gateway
          - context: ai-microservice
            image: ai-microservice
    steps:
      - uses: actions/checkout@v4
      - name: Downcase IMAGE_PREFIX
        run: echo "IMAGE_PREFIX=${GITHUB_REPOSITORY,,}" >> $GITHUB_ENV
      - uses: docker/setup-buildx-action@v3
      - uses: docker/login-action@v3
        with:
          registry: ${{ env.REGISTRY }}
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}
      - uses: docker/build-push-action@v5
        with:
          context: ${{ matrix.context }}
          push: ${{ github.ref == 'refs/heads/main' }}
          tags: ${{ env.REGISTRY }}/${{ env.IMAGE_PREFIX }}/${{ matrix.image }}:${{ github.sha }}
          cache-from: type=gha
          cache-to: type=gha,mode=max

  # ── Integration Tests ──────────────────────────────────────────────────────
  integration:
    name: Integration Tests
    runs-on: ubuntu-latest
    needs: docker-build
    if: github.ref == 'refs/heads/main'
    steps:
      - uses: actions/checkout@v4
      - run: |
          cd network
          docker-compose -f docker-compose.yaml up -d couchdb0 couchdb1 couchdb2 api-gateway ai-microservice
          sleep 10
          # Health checks
          curl -f http://localhost:3001/health || exit 1
          curl -f http://localhost:8000/health || exit 1
          # Cleanup
          docker-compose down -v
